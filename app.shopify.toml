# This file stores your app's configuration. Do not edit this file directly.
# Instead, use the `shopify app` command to manage your app's configuration.

scopes = "read_products,write_products,read_product_listings,read_collections,write_collections,read_content,write_content,read_themes,write_themes,read_files,write_files,read_online_store_navigation,write_online_store_navigation,read_analytics"

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2025-01"

[[webhooks.subscriptions]]
topics = ["app/uninstalled"]
uri = "/webhooks/app/uninstalled"

[[webhooks.subscriptions]]
topics = ["products/update"]
uri = "/webhooks/products/update"

[[webhooks.subscriptions]]
topics = ["collections/update"]
uri = "/webhooks/collections/update"

[[webhooks.subscriptions]]
topics = ["themes/publish"]
uri = "/webhooks/themes/publish"

[app_proxy]
url = "https://example.com/proxy"
subpath = "apex-seo"
prefix = "apps"

[[extensions]]
type = "theme"
name = "apex-seo-theme"
handle = "apex-seo-theme"
